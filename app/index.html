<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetroRider</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <div id="app">
    <div id="map-selector-screen"></div>

    <div id="loading-overlay">
      <div class="loader"></div>
      <div class="loader-text">Loading world from OpenStreetMap...</div>
    </div>

    <canvas id="game-canvas"></canvas>

    <div id="hud" class="hidden">
      <div class="hud-top">
        <div class="hud-badge" id="hud-line-badge">
          <span class="hud-line-dot" id="hud-line-dot"></span>
          <span>
            <span class="label">Line</span>
            <span class="value" id="hud-line-name">&mdash;</span>
          </span>
        </div>
        <div class="hud-badge">
          <span class="label">Direction</span>
          <span class="value" id="hud-direction">&mdash;</span>
        </div>
      </div>

      <div class="hud-speed">
        <div class="speed-ring">
          <svg viewBox="0 0 140 140">
            <circle class="track" cx="70" cy="70" r="60" stroke-dasharray="283" stroke-dashoffset="70"/>
            <circle class="fill" id="speed-arc" cx="70" cy="70" r="60" stroke-dasharray="283" stroke-dashoffset="283"/>
          </svg>
          <div class="speed-value">
            <div class="num" id="speed-num">0</div>
            <div class="unit">KM/H</div>
          </div>
        </div>
      </div>

      <div class="hud-station" id="hud-station"></div>

      <div class="hud-controls">
        <div class="ctrl-col">
          <div class="ctrl-btn accel" id="btn-accel">&#9650;</div>
          <div class="ctrl-btn" id="btn-brake">&#9660;</div>
        </div>
        <div class="ctrl-col">
          <div class="ctrl-btn" id="btn-horn">&#128227;</div>
          <div class="ctrl-btn" id="btn-reverse">&#8634;</div>
        </div>
        <div class="ctrl-col">
          <div class="ctrl-btn" id="btn-doors">&#8863;</div>
        </div>
      </div>

      <div class="hud-camera">
        <div class="camera-pill" id="btn-camera">
          <span id="cam-label">CAB VIEW</span> &middot; <kbd>C</kbd>
        </div>
        <div class="camera-pill mute-pill" id="btn-mute">
          <span id="mute-icon">&#128266;</span>
        </div>
      </div>

      <div class="hud-lines" id="hud-lines"></div>
      <div class="station-picker hidden" id="station-picker"></div>

      <div class="hud-keys">
        <kbd>W</kbd> / <kbd>&uarr;</kbd> Accelerate<br>
        <kbd>S</kbd> / <kbd>&darr;</kbd> Brake<br>
        <kbd>Space</kbd> Emergency brake<br>
        <kbd>D</kbd> Open/close doors<br>
        <kbd>C</kbd> Camera mode<br>
        <kbd>R</kbd> Reverse direction<br>
        <kbd>H</kbd> Horn<br>
        <kbd>1</kbd>&ndash;<kbd>9</kbd> Switch line
      </div>

      <div class="hud-passengers" id="hud-passengers">
        <span class="label">Passengers</span>
        <span class="value" id="passenger-count">0</span>
      </div>

      <div class="hud-map-btn" id="btn-change-map">
        <span>Change Map</span>
      </div>
    </div>

    <div id="toast-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
